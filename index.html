<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
    a{
      display: block;
      padding: 10px;
      border: 1px solid;
      border-radius: 2px;
      background-color: antiquewhite;
      text-decoration: none;
      color: black;
      font-weight: bold;
      margin: 5px;     
 }
 a:hover{
  background-color: darkcyan;

 }
 .box{
  border: 2px;
  padding: 20px;
 }
    </style>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-3">
        <h2>MENU</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="Stockregistration.html">Stock Registration</a>
        <a href="salesregistration.html">Sales Registation</a>
        <a href="supplierregistration.html">Supplier Registration</a>  
        <a href="transport">Transport</a>
         </div>
      <div class="col " style="background-color: #FAF0E6;">
        <h1 class="text-center">NYONDO STORE</h1>
        <h1 class="text-center">Stock Registration Form</h1>
        <form action="">
          <div class="box">
          <!--Section One-->
          <h2 class="text-center mt-3">Stock Identification</h2>
          <div class="col">
            <label for="formGroupExampleInput" class="form-label">Date</label>
            <input type="date" class="form-control" placeholder="" aria-label="First name" />
          </div>

          <div class="row my-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"> Item code</label>
              <input type="text" class="form-control" placeholder="Enter code" aria-label="First name" />
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Item Name</label>
              <input type="text-area" class="form-control" placeholder="Enter item name" aria-label="" />

            </div>
            <div class="row my-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"> Category</label>
                <select class="form-select" aria-label="Default select example">
                  <option selected>select category</option>
                  <option value="1">Office Supplies</option>
                  <option value="2">Electronics</option>
                  <option value="3">Furniture</option>
                  <option value="3">Cleaning Supplies</option>
                  <option value="3">Spare parts</option>
                </select>
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label">Supplier Name</label>
                <input type="text-area" class="form-control" placeholder="Enter Supplier " aria-label="" />
              </div>
            </div>
            <!--Section two-->
            <h2 class="text-center">Stock Details</h2>
            <div class="row my-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"> Stock received</label>
                <input type="text" class="form-control" placeholder="Enter name" aria-label="First name" />
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"> Quantity received</label>
                 <input type="text" class="form-control" placeholder="Enter name" aria-label="First name" />
           
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"> Purchase Price per Unit</label>
                <input type="number" class="form-control" placeholder="Enter number" aria-label="First name" />
              </div>
            </div>
            <div class="row my-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"> Invoice Number</label>
                <input type="text" class="form-control" placeholder="Enter number" aria-label="First name" />
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label">Batch Number </label>
                <input type="text" class="form-control" placeholder="Enter number" aria-label="First name" />
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"> Total Purchase Cost</label>
                <input type="text" class="form-control" placeholder="Enter cost" aria-label="First name" />
              </div>
            </div>
            <!--Section three-->
            <h2 class="text-center">Logistics and Tracking</h2>
            <div class="row my-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label"> Supplier Name</label>
                <input type="text" class="form-control" placeholder="Enter name" aria-label="First name" />
              </div>
              <div class="col">
                <label for="formGroupExampleInput" class="form-label">Date Received</label>
                <input type="Date" class="form-control" placeholder="" aria-label="" />
              </div>
              <h2 class="text-center">Storage Location</h2>
              <div class="row my-3">
                <div class="col">
                  <label for="formGroupExampleInput" class="form-label"> WareHouse</label>
                  <input type="text" class="form-control" placeholder="Enter name" aria-label="First name" />
                </div>
                <div class="col">
                  <label for="formGroupExampleInput" class="form-label"> Shelf Location</label>
                  <input type="text" class="form-control" placeholder="Enter shelf location" aria-label="First name" />
                </div>
              </div>
            </div>
            <!-- remarks -->
            <div class="row my-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label">Remarks</label>
                <input type="text-area" class="form-control" placeholder="Write remarks" aria-label="" />
              </div>
            </div>
            <div class="row my-3">
              <div class="col">
                <label for="formGroupExampleInput" class="form-label">Signature</label>
                <input type="text-area" class="form-control" placeholder="sign here" aria-label="" />
              </div>
            </div>
            </div>
        </form>
        <div class="row">
          <div class="col">
            <button type="button" class="btn btn-primary btn-sm">Cancel</button>
          </div>
          <div class="col text-end">
            <button type="button" class="btn btn-secondary btn-sm">Submit</button>
          </div>
        </div>
      </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
</body>

</html>
